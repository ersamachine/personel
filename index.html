<!DOCTYPE html><html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0e0e0e"><title>ERSA Yönetici Paneli</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{--bg:#0e0e0e;--card:#1b1b1b;--card2:#161616;--red:#C51515;--gold:#F5A623;--green:#2ED573;--blue:#5B8DEF;--purple:#9B7BFF;--muted:#8A8A8A;--line:#262626;--ink:#fff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;}
i.ic svg{display:block;}
.shell{display:flex;min-height:100vh;}
.side{width:236px;background:#121212;border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:9px;padding:4px 8px 14px;border-bottom:1px solid var(--line);margin-bottom:10px;}
.brand .lg{width:30px;height:30px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;}
.brand .nm{font-weight:800;font-size:12.5px;}.brand .sb{font-size:9px;color:var(--muted);letter-spacing:1px;}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;font-size:12.5px;color:#c7c7c7;font-weight:600;cursor:pointer;}
.ni.on{background:var(--red);color:#fff;}.ni .bd{margin-left:auto;font-size:10px;font-weight:800;border-radius:10px;padding:1px 7px;}
.who{border-top:1px solid var(--line);padding-top:11px;display:flex;align-items:center;gap:9px;font-size:12px;}
.av{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;background:rgba(14,14,14,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;z-index:5;}
.topbar .h{font-size:18px;font-weight:800;}.topbar .s{font-size:11.5px;color:var(--muted);margin-top:1px;}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.view{padding:20px 22px 90px;max-width:1080px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;}
.kpi.alert{border-color:#3a1d1d;background:#1d1414;}
.kpi .t{font-size:10px;color:var(--muted);letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
.kpi .v{font-size:19px;font-weight:800;margin-top:7px;font-variant-numeric:tabular-nums;}.kpi .x{font-size:10px;color:var(--muted);margin-top:2px;}
.sec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;margin:22px 0 9px;display:flex;align-items:center;gap:7px;}
.box{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.row{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--line);font-size:13px;}.row:last-child{border-bottom:none;}
.row.hd{background:var(--card2);font-size:10px;color:var(--muted);letter-spacing:.5px;font-weight:700;padding:9px 15px;}
.grow{flex:1;min-width:0;}.nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mono{font-variant-numeric:tabular-nums;}
.btn{border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.b-on{background:#16331F;color:#5fd08a;}.b-no{background:#2a1414;color:#FF6B5E;}.b-w{background:#23262e;color:#9db8f0;}
.pill{font-size:9.5px;font-weight:800;border-radius:20px;padding:3px 9px;white-space:nowrap;}
.p-o{background:#2C2410;color:#F5A623;}.p-r{background:#2a1414;color:#FF6B5E;}.p-b{background:#19223a;color:#7FA6F0;}.p-g{background:#11271A;color:#2ED573;}.p-m{background:#221a36;color:#b79bff;}
.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px;}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:#fff;font-size:14px;outline:none;}
.sel{background:var(--card2);border:1px solid var(--line);border-radius:8px;color:#fff;font-size:12px;padding:6px 8px;outline:none;}
.bottomnav{display:none;}
/* login */
.login{max-width:380px;margin:0 auto;padding:60px 22px;}
.login .lg{width:54px;height:54px;border-radius:14px;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;margin:0 auto 16px;}
.loginlogo{display:block;width:220px;max-width:76%;height:auto;margin:8px auto 20px;}
.lt{text-align:center;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:24px;}
.lbl{display:block;font-size:11px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
.field{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;color:#fff;font-size:15px;outline:none;}
.field:focus{border-color:var(--red);}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:14px;margin-top:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.rememberbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:14px;}
.lerr{color:#FF6B5E;font-size:12.5px;text-align:center;margin-top:12px;min-height:16px;}
/* overlay form */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal{background:#181818;border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 18px 28px;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}.mh .t{font-size:16px;font-weight:800;}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#262626;color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.5);}
@media(min-width:760px){ .modal{border-radius:18px;align-self:center;} .ovl{align-items:center;} }
@media(max-width:859px){
  .side{display:none;} .bottomnav{display:flex;} .content{padding-bottom:0;}
  .view{padding:16px 14px 86px;} .topbar{padding:13px 16px;}
  .kpis{grid-template-columns:1fr 1fr;}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;height:62px;background:#141414;border-top:1px solid var(--line);justify-content:flex-start;align-items:center;padding-bottom:6px;z-index:20;overflow-x:auto;}
  .bottomnav::-webkit-scrollbar{display:none;}
  .bn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-weight:600;cursor:pointer;flex:0 0 auto;min-width:62px;padding:0 4px;}.bn.on{color:#fff;}
  .row{flex-wrap:wrap;}
}
</style></head>
<body><div id="root"></div>
<script src="config.js"></script>
<script>
const $=id=>document.getElementById(id);
const S={authed:false,kod:"",sifre:"",data:null,loading:false,tab:"ozet",ekstre:null,sheet:null,sheetData:null,busy:false,err:"",q:""};
const money=(n,c)=>(c||"$")+Math.round(Number(n)||0).toLocaleString("tr-TR");
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
const P={grid:"M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",wallet:"M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2H5a2 2 0 0 0-2 2zM3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM16 12.5h3v3h-3a1.5 1.5 0 0 1 0-3z",check:"M20 6 9 17l-5-5",receipt:"M5 3v18l2-1.5L9 21l2-1.5L13 21l2-1.5L17 21l2-1.5V3l-2 1.5L15 3l-2 1.5L11 3 9 4.5 7 3zM8 8h8M8 12h8",cash:"M2 6h20v12H2zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6M6 9v.01M18 15v.01",minus:"M5 12h14",users:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 7v5l3.5 2",logout:"M16 17l5-5-5-5M21 12H9M12 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6",x:"M18 6 6 18M6 6l12 12",wrench:"M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",alert:"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z",plus:"M12 5v14M5 12h14",cal:"M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3H4zM4 9h16v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM8 3v3M16 3v3",doc:"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6",refresh:"M21 12a9 9 0 1 1-2.6-6.3M21 4v5h-5",cl:"m15 6-6 6 6 6",phone:"M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.1a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z",bank:"M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3",chart:"M3 3v18h18M7 15l4-5 3 3 5-7",tag:"M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01",send:"M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z",key:"M14 7a4 4 0 1 0-3.9 5L9 13l-2 2 1.5 1.5L7 18l2 2 4.1-4.1A4 4 0 0 0 14 7zM15.5 6.5h.01",pkg:"M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8",ext:"M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6",bell:"M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"};
function ic(n,s,c){const d=P[n];if(!d)return"";return '<i class="ic"><svg width="'+(s||16)+'" height="'+(s||16)+'" viewBox="0 0 24 24" fill="none" stroke="'+(c||'#fff')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+d.split('M').filter(Boolean).map(p=>'<path d="M'+p+'"/>').join('')+'</svg></i>';}
function toast(m){const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function initials(s){s=String(s||"").trim();if(!s)return"P";const p=s.split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();}

async function api(action,extra){
  const body=Object.assign({kod:S.kod,sifre:S.sifre,action:action},extra||{});
  const r=await fetch(window.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return await r.json();
}
async function login(){
  const k=$("lkod").value.trim(), s=$("lsifre").value.trim();
  if(!k||!s){S.err="Kod ve şifre girin.";render();return;}
  S.kod=k;S.sifre=s;S.busy=true;S.err="";renderLogin();
  try{ const res=await api("data"); if(res&&res.ok){ S.authed=true;S.data=res;S.busy=false; if($("lrem")&&$("lrem").checked){try{localStorage.setItem("pp_kod",k);localStorage.setItem("pp_sifre",s);}catch(e){}} render(); }
    else { S.busy=false;S.err=(res&&res.error)||"Giriş başarısız.";renderLogin(); } }
  catch(e){ S.busy=false;S.err="Bağlantı hatası.";renderLogin(); }
}
async function reload(){ S.loading=true;render(); try{const res=await api("data"); if(res&&res.ok)S.data=res;}catch(e){} S.loading=false;render(); }
async function act(action,extra,okMsg){ if(S.busy)return; S.busy=true; try{ const res=await api(action,extra); if(res&&res.ok){ if(okMsg)toast(okMsg); const r=await api("data"); if(r&&r.ok)S.data=r; } else toast((res&&res.error)||"İşlem başarısız"); }catch(e){ toast("Bağlantı hatası"); } S.busy=false; render(); }
function logout(){ try{localStorage.removeItem("pp_kod");localStorage.removeItem("pp_sifre");}catch(e){} S.authed=false;S.data=null;S.kod="";S.sifre="";render(); }

const TAKIP_DURUMLAR=["Arandı","Söz Verildi","Ödeme Bekleniyor","Çözüldü"];
const EMAIL_SABLON=[
 {ad:"— Şablon seç —",konu:"",mesaj:""},
 {ad:"Ödeme hatırlatma",konu:"ERSA MACHINERY · Ödeme Hatırlatması",mesaj:"Merhaba,\n\nVadesi yaklaşan/gelen ödemenizi hatırlatmak isteriz. Ödeme bilgilerine ve güncel bakiyenize müşteri portalınızdan ulaşabilirsiniz.\n\nİyi çalışmalar dileriz."},
 {ad:"Teklif takibi",konu:"ERSA MACHINERY · Teklifiniz Hakkında",mesaj:"Merhaba,\n\nİlettiğiniz teklif talebiyle ilgili görüşmek isteriz. Uygun olduğunuzda dönüş yapabilir misiniz?\n\nTeşekkür ederiz."},
 {ad:"Sipariş bilgisi",konu:"ERSA MACHINERY · Sipariş Bilgilendirme",mesaj:"Merhaba,\n\nSiparişinizin güncel durumunu portalınızdaki “Siparişlerim” bölümünden adım adım takip edebilirsiniz. Sorularınız için bize ulaşabilirsiniz.\n\nSaygılarımızla."},
 {ad:"Genel bilgilendirme",konu:"ERSA MACHINERY · Bilgilendirme",mesaj:"Merhaba,\n\n"}
];
const TABS=[["ozet","Özet","grid"],["plan","Tahsilat Planı","chart"],["musteriler","Müşteriler & Bakiye","users"],["odeme","Ödeme Onayları","check"],["teklif","Teklifler","tag"],["sifre","Şifre Talepleri","key"],["siparis","Siparişler","pkg"],["geciken","Geciken Ödemeler","alert"],["istanbul","İstanbul Şube","doc"],["cek","Çekler","bank"],["servis","Servis Talepleri","wrench"]];
const TITLE={ozet:["Özet","Tüm operasyon tek bakışta"],plan:["Tahsilat Planı","Önümüzdeki 30 / 60 / 90 günde tahsil edilecek alacaklar"],musteriler:["Müşteriler & Bakiye","Cari bakiyeler · tek tıkla müşteri uygulamasını aç"],odeme:["Ödeme Onayları","Portaldan gelen ödeme bildirimleri"],teklif:["Teklifler","Müşteri fiyat teklifi talepleri — yanıtlayın"],sifre:["Şifre Talepleri","Makine açılış şifresi talepleri — şifreyi gönderin"],siparis:["Siparişler","Sipariş durumunu güncelleyin / yeni sipariş ekleyin"],geciken:["Geciken Ödemeler","Vadesi geçmiş taksitler"],istanbul:["İstanbul Şube","Ali'nin masraf & tahsilatları — onayınıza düşer"],cek:["Çekler","Çek portföyü ve vade takibi"],servis:["Servis Talepleri","Müşteri portalından gelen arızalar"]};
function badgeOf(t){const o=(S.data&&S.data.ozet)||{};if(t==="odeme"&&o.bekleyenOnay)return[o.bekleyenOnay,"#F5A623","#111"];if(t==="teklif"&&o.bekleyenTeklif)return[o.bekleyenTeklif,"#F5A623","#111"];if(t==="sifre"&&o.bekleyenSifre)return[o.bekleyenSifre,"#F5A623","#111"];if(t==="geciken"&&o.gecikenAdet)return[o.gecikenAdet,"#C51515","#fff"];if(t==="istanbul"&&o.istBekleyen)return[o.istBekleyen,"#F5A623","#111"];if(t==="servis"&&o.acikServis)return[o.acikServis,"#5B8DEF","#fff"];if(t==="cek"&&o.yaklasanCek)return[o.yaklasanCek,"#5B8DEF","#fff"];return null;}

function render(){
  if(!S.authed){renderLogin();return;}
  const d=S.data||{}, p=d.personel||"Personel";
  const nav=TABS.map(t=>{const on=S.tab===t[0];const b=badgeOf(t[0]);return '<div class="ni'+(on?' on':'')+'" data-tab="'+t[0]+'">'+ic(t[2],16,on?'#fff':'#bdbdbd')+' <span>'+t[1]+'</span>'+(b?'<span class="bd" style="background:'+b[1]+';color:'+b[2]+';">'+b[0]+'</span>':'')+'</div>';}).join('');
  const bnav=TABS.map(t=>{const on=S.tab===t[0];const b=badgeOf(t[0]);return '<div class="bn'+(on?' on':'')+'" data-tab="'+t[0]+'" style="position:relative;">'+(b?'<span style="position:absolute;top:-2px;right:12px;background:'+b[1]+';color:'+b[2]+';font-size:8px;font-weight:800;border-radius:8px;padding:0 4px;">'+b[0]+'</span>':'')+ic(t[2],19,on?'#fff':'#8A8A8A')+' '+t[1].split(' ')[0]+'</div>';}).join('');
  const tt=TITLE[S.tab]||["",""];
  let body = S.loading ? '<div class="empty" style="padding-top:80px;">'+ic('refresh',26,'#5A5A5A')+'<div style="margin-top:8px;">Yükleniyor…</div></div>' : viewFor();
  $("root").innerHTML=
   '<div class="shell"><aside class="side"><div class="brand"><div class="lg">E</div><div><div class="nm">ERSA MACHINERY</div><div class="sb">YÖNETİCİ PANELİ</div></div></div>'
   +'<div class="nav">'+nav+'</div>'
   +'<div class="who"><div class="av">'+esc(initials(p))+'</div><div style="min-width:0;"><div style="font-weight:700;" class="nowrap">'+esc(p)+'</div><div style="color:var(--muted);font-size:10px;">'+esc(d.rol||"Personel")+'</div></div><div style="margin-left:auto;cursor:pointer;" data-act="logout">'+ic('logout',16,'#777')+'</div></div></aside>'
   +'<main class="content"><div class="topbar"><div><div class="h">'+esc(tt[0])+'</div><div class="s">'+esc(tt[1])+'</div></div><div style="display:flex;gap:8px;align-items:center;"><div class="iconbtn" data-act="bildirimAc" style="position:relative;">'+ic('bell',17,'#bbb')+((S.data&&S.data.ozet&&S.data.ozet.yeniToplam)?'<span style="position:absolute;top:-3px;right:-3px;background:#C51515;color:#fff;font-size:9px;font-weight:800;border-radius:9px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;">'+S.data.ozet.yeniToplam+'</span>':'')+'</div><div class="iconbtn" data-act="tahsilat">'+ic('plus',17,'#5fd08a')+'</div><div class="iconbtn" data-act="reload">'+ic('refresh',16,'#bbb')+'</div></div></div>'
   +'<div class="view">'+body+'</div></main>'
   +'<nav class="bottomnav">'+bnav+'</nav></div>'

function renderLogin(){
  const k=(()=>{try{return localStorage.getItem("pp_kod")||""}catch(e){return""}})();
  const s=(()=>{try{return localStorage.getItem("pp_sifre")||""}catch(e){return""}})();
  $("root").innerHTML='<div class="login"><img class="loginlogo" src="'+LOGO_B64+'" alt="ERSA MACHINERY"><div class="lt">YÖNETİCİ PANELİ</div>'
   +'<label class="lbl">Personel Kodu</label><input id="lkod" class="field" type="text" value="'+esc(k)+'" placeholder="Size verilen kod" autocapitalize="characters">'
   +'<label class="lbl">Şifre</label><input id="lsifre" class="field" type="password" value="'+esc(s)+'" placeholder="••••••••">'
   +'<label class="rememberbox"><input id="lrem" type="checkbox" checked> Beni hatırla</label>'
   +'<button class="btnred" data-act="login" '+(S.busy?'disabled':'')+'>'+(S.busy?'Giriş yapılıyor…':(ic('check',16,'#fff')+' Giriş Yap'))+'</button>'
   +'<div class="lerr">'+esc(S.err||"")+'</div></div>';
  const sp=$("lsifre"); if(sp) sp.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
}

const EKSTRE_CSS=`
  :root{--slate:#2F343C;--ink:#1f242b;--muted:#737a84;--line:#e4e6ea;--soft:#f5f6f8;--green:#1F8B4C;--borc:#B0271F}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:letter;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#54585e;color:#1a1a1a}
  .bar{position:sticky;top:0;display:flex;align-items:center;gap:14px;background:#1b1b1b;color:#ddd;padding:11px 16px;font-size:12.5px}
  .bar button{background:#C51515;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .bar span{color:#9aa0a6}
  @media print{.bar{display:none}}
  .page{position:relative;width:215.9mm;height:279.4mm;margin:14px auto;background:#fff url(${ANTET_B64}) no-repeat top center;background-size:100% 100%;box-shadow:0 10px 40px rgba(0,0,0,.45);overflow:hidden}
  @media print{.page{margin:0;box-shadow:none}}
  .ov{position:absolute;left:7%;right:7%;top:15.2%;bottom:6.2%;display:flex;flex-direction:column}
  .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:13px}
  .cust .lbl{font-size:8.5px;letter-spacing:1.6px;color:var(--muted);font-weight:700}
  .cust .nm{font-size:14.5px;font-weight:800;color:var(--ink);margin:3px 0 4px;letter-spacing:.2px}
  .cust .ct{font-size:10.5px;color:#5b626b;line-height:1.55}
  .meta{font-size:10px;color:#5b626b;text-align:right;line-height:1.7;white-space:nowrap}
  .meta b{color:var(--ink)}
  .sum{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:16px}
  .sum .c{flex:1;padding:9px 13px;border-right:1px solid var(--line)}
  .sum .c:last-child{border-right:none;background:#f7f8fa}
  .sum .c span{display:block;font-size:8px;letter-spacing:1px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .sum .c b{font-size:15px;font-weight:800;color:var(--ink)}
  .sum .c b.g{color:var(--green)}
  .sum .c.bak b{color:var(--borc)}
  .sh{font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;font-weight:700;color:var(--slate);letter-spacing:.3px;padding-bottom:4px;border-bottom:1.5px solid var(--slate);margin-bottom:7px}
  table{width:100%;border-collapse:collapse;font-size:10.5px}
  thead th{background:var(--soft);color:#5b626b;font-size:8px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;text-align:left;padding:6px 9px;border-bottom:1px solid var(--line)}
  thead th.r{text-align:right}
  tbody td{padding:6px 9px;border-bottom:1px solid #f1f2f4;color:#33383f}
  tbody td.r{text-align:right;white-space:nowrap}
  .tar{color:#7c828b;white-space:nowrap}
  .borc{color:var(--borc);font-weight:700}.alacak{color:var(--green);font-weight:700}.bk{font-weight:800;color:var(--ink)}
  tfoot td{padding:7px 9px;font-weight:800;font-size:10.5px;border-top:1.5px solid var(--slate)}
  tfoot td.r{text-align:right}
  .tkblock{margin-top:14px}
  table.tk td{padding:5.5px 9px}
  .pill{display:inline-block;font-size:8px;font-weight:800;padding:2px 7px;border-radius:20px;background:#fdf0d9;color:#9a6b00;letter-spacing:.3px}
`;
function printEkstre(tk){
  const e=S.ekstre||{}; if(!e.musteri){toast("Müşteri verisi yok");return;}
  const o=e.ozet||{};
  const M=n=>"$"+Math.round(Number(n)||0).toLocaleString("tr-TR");
  const dd=s=>{ if(!s)return""; const p=String(s).split("-"); return p.length===3?(p[2]+"."+p[1]+"."+p[0]):String(s); };
  const t0=new Date(), tg=("0"+t0.getDate()).slice(-2)+"."+("0"+(t0.getMonth()+1)).slice(-2)+"."+t0.getFullYear();
  const all=(e.ekstre||[]).slice(); const N=14; let rows="", run=0, start=0;
  if(all.length>N){ const cut=all.length-N; for(let i=0;i<cut;i++){ run+=(all[i].borc||0)-(all[i].alacak||0); } rows+='<tr><td class="tar">—</td><td>Devreden bakiye (önceki hareketler)</td><td class="r">—</td><td class="r">—</td><td class="r bk">'+M(run)+'</td></tr>'; start=cut; }
  for(let i=start;i<all.length;i++){ const h=all[i]; run+=(h.borc||0)-(h.alacak||0); const f=(h.borc||0)>0;
    rows+='<tr><td class="tar">'+dd(h.tarih)+'</td><td>'+esc(h.aciklama||h.tip||"")+'</td><td class="r borc">'+(f?M(h.borc):"—")+'</td><td class="r alacak">'+(!f&&(h.alacak||0)>0?M(h.alacak):"—")+'</td><td class="r bk">'+M(run)+'</td></tr>'; }
  if(!all.length) rows='<tr><td colspan="5" style="text-align:center;color:#888;padding:14px;">Hareket kaydı yok.</td></tr>';
  const tFat=Number(o.toplamFatura)||0, tTah=Number(o.toplamTahsilat)||0, tBak=(o.bakiye!=null?Number(o.bakiye):run);
  let tkHtml="";
  if(tk){ const tks=(e.taksitler||[]).filter(t=>String(t.durum)!=="Ödendi");
    if(tks.length){ const r=tks.map(t=>'<tr><td class="tar">'+dd(t.vade)+'</td><td>'+esc(t.taksit||"Taksit")+'</td><td><span class="pill">'+esc(String(t.durum||"Bekliyor").toLocaleUpperCase("tr"))+'</span></td><td class="r bk">'+M(t.tutar)+'</td></tr>').join("");
      tkHtml='<div class="tkblock"><div class="sh">Açık Taksitler / Ödeme Planı</div><table class="tk"><thead><tr><th style="width:80px">Vade</th><th>Kalem</th><th>Durum</th><th class="r">Tutar</th></tr></thead><tbody>'+r+'</tbody></table></div>';
    }
  }
  const ct=esc([e.email,e.tel].filter(Boolean).join(" · "));
  const doc='<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cari Ekstre · '+esc(e.musteri)+'</title>'
   +'<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">'
   +'<style>'+EKSTRE_CSS+'</style></head><body>'
   +'<div class="bar"><button onclick="window.print()">⬇ PDF olarak kaydet</button><span>Açılan pencerede “Hedef”i <b>PDF olarak kaydet</b> seçin.</span></div>'
   +'<div class="page"><div class="ov">'
     +'<div class="row1"><div class="cust"><div class="lbl">CARİ HESAP</div><div class="nm">'+esc(e.musteri)+'</div><div class="ct">'+ct+'</div></div>'
     +'<div class="meta">Ekstre tarihi: <b>'+tg+'</b><br>Para birimi: <b>USD ($)</b><br>Dönem: tüm hareketler</div></div>'
     +'<div class="sum"><div class="c"><span>Toplam Fatura</span><b>'+M(tFat)+'</b></div><div class="c"><span>Toplam Tahsilat</span><b class="g">'+M(tTah)+'</b></div><div class="c bak"><span>Bakiye</span><b>'+M(tBak)+'</b></div></div>'
     +'<div class="sh">Hesap Hareketleri</div>'
     +'<table><thead><tr><th style="width:80px">Tarih</th><th>Açıklama</th><th class="r">Borç</th><th class="r">Alacak</th><th class="r">Bakiye</th></tr></thead><tbody>'+rows+'</tbody>'
     +'<tfoot><tr><td colspan="2">TOPLAM</td><td class="r borc">'+M(tFat)+'</td><td class="r alacak">'+M(tTah)+'</td><td class="r">'+M(tBak)+'</td></tr></tfoot></table>'
     +tkHtml
   +'</div></div>'
   +'<scr'+'ipt>window.onload=function(){setTimeout(function(){try{window.focus();window.print();}catch(_){}}, 500);};</scr'+'ipt>'
   +'</body></html>';
  const w=window.open("","_blank");
  if(!w){ toast("Açılır pencereye izin verin (popup engellendi)"); return; }
  w.document.open(); w.document.write(doc); w.document.close();
}

  if(S.sheet==="bildirim"){
    const list=((S.data||{}).bildirim||[]);
    const rows=list.map(b=>'<div class="row" data-act="bildirimGit" data-tab="'+esc(b.tab)+'" style="cursor:pointer;"><div class="grow"><div style="font-weight:700;">'+esc(b.tip)+'</div><div style="font-size:11.5px;color:var(--muted);" class="nowrap">'+esc(b.musteri||"")+(b.ozet?" · "+esc(b.ozet):"")+'</div></div>'+ic('cl',16,'#666')+'</div>').join('')||'<div class="empty">Bekleyen yeni talep yok 🎉</div>';
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Bildirim Merkezi'+(list.length?' ('+list.length+')':'')+'</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div><div class="box">'+rows+'</div></div></div>';
  }
  if(S.sheet==="sifreYanit"){
    const x=S.sheetData||{};
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Makine Şifresi Ver</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
     +'<div class="box" style="padding:12px;margin-bottom:12px;"><div style="font-weight:700;">'+esc(x.makine||"Makine")+'</div><div style="font-size:12px;color:var(--muted);margin-top:3px;">'+esc(x.musteri||"")+'</div></div>'
     +'<label class="lbl">Açılış Şifresi (müşteri bunu görecek)</label><input id="sf_txt" class="field" value="'+esc(x.sifre||"")+'" placeholder="Örn: 4729-AB">'
     +'<button class="btnred" data-act="sifreKaydet" data-row="'+x.row+'" style="margin-top:14px;" '+(S.busy?'disabled':'')+'>'+ic('key',16,'#fff')+' Şifreyi Gönder (Verildi)</button>'
     +'<button class="btn b-no" data-act="sifreReddet" data-row="'+x.row+'" style="width:100%;justify-content:center;padding:11px;margin-top:8px;">'+ic('x',14,'#FF6B5E')+' Reddet</button></div></div>';
  }
  if(S.sheet==="siparisEkle"){
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Yeni Sipariş</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
     +'<label class="lbl">Müşteri</label><input id="sp_mus" class="field" placeholder="Müşteri adı (cariyle aynı)">'
     +'<label class="lbl">Makine</label><input id="sp_mak" class="field" placeholder="Makine / ürün">'
     +'<label class="lbl">Adet</label><input id="sp_adet" class="field" type="number" value="1">'
     +'<label class="lbl">Not (isteğe bağlı)</label><input id="sp_not" class="field" placeholder="not">'
     +'<button class="btnred" data-act="siparisKaydet" style="margin-top:14px;" '+(S.busy?'disabled':'')+'>'+ic('plus',16,'#fff')+' Siparişi Ekle</button></div></div>';
  }
  if(S.sheet==="teklifYanit"){
    const x=S.sheetData||{};
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Teklifi Yanıtla</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
     +'<div class="box" style="padding:12px;margin-bottom:12px;"><div style="font-weight:700;">'+esc(x.urun||"Teklif")+'</div><div style="font-size:12px;color:var(--muted);margin-top:3px;">'+esc(x.musteri||"")+(x.adet?" · "+esc(x.adet)+" adet":"")+'</div>'+(x.aciklama?'<div style="font-size:12px;color:#cfcfcf;margin-top:6px;">'+esc(x.aciklama)+'</div>':'')+'</div>'
     +'<label class="lbl">Yanıt / Fiyat Teklifi (müşteri bunu görecek)</label><textarea id="ty_txt" class="field" style="min-height:120px;resize:vertical;" placeholder="Örn:\nBirim fiyat: $12.500 (FOB Shanghai)\nTeslim süresi: 45 gün\nGaranti: 2 yıl\nNot: ...">'+esc(x.yanit||"")+'</textarea>'
     +'<button class="btnred" data-act="teklifYanitKaydet" data-row="'+x.row+'" '+(S.busy?'disabled':'')+'>'+ic('send',16,'#fff')+' Yanıtı Gönder</button></div></div>';
  }
  if(S.sheet==="gecikenEkle"){
    const ms=((S.data||{}).musteriler||[]).filter(m=>m.bakiye>0);
    const opts='<option value="">— Müşteri seç —</option>'+ms.map(m=>'<option value="'+esc(m.musteri)+'" data-bak="'+m.bakiye+'">'+esc(m.musteri)+' · bakiye '+money(m.bakiye)+'</option>').join('');
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Bakiyeli Müşteri Ekle</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
     +'<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Taksit planı olmayıp bakiyesi olan müşteriyi Geciken Ödemeler\'e ekle. Tutar otomatik güncel bakiyedir.</div>'
     +'<label class="lbl">Müşteri</label><select id="gc_mus" class="field">'+opts+'</select>'
     +'<div id="gc_bal" style="display:none;background:#11271A;border:1px solid #1d3a28;border-radius:10px;padding:11px 13px;margin-top:10px;font-size:12.5px;color:#9fe0bb;">Güncel bakiye: <b id="gc_balv" style="color:#2ED573;font-size:15px;"></b> · bu tutar listeye düşecek</div>'
     +'<label class="lbl">Not (isteğe bağlı)</label><input id="gc_not" class="field" placeholder="Örn. sözlü anlaşma / açık hesap">'
     +'<button class="btnred" data-act="gecikenKaydet" style="margin-top:16px;" '+(S.busy?'disabled':'')+'>'+ic('plus',16,'#fff')+' Geciken\'e Ekle</button>'
     +'<div style="font-size:11px;color:var(--muted);margin-top:8px;">Sadece bakiyesi olan müşteriler listelenir. Eklenince Geciken Ödemeler\'de \"Bakiye\" etiketiyle görünür.</div></div></div>';
  }
  if(S.sheet!=="tahsilat") return "";
  const pre=S.sheetData||{};
  const today=new Date().toISOString().slice(0,10);
  if(S.sheet==="ekstrePdf"){
    const e=S.ekstre||{}; const on=S.ekstreTk!==false;
    return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Cari Ekstre</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
     +'<div style="font-size:12.5px;color:var(--muted);margin-bottom:6px;">'+esc(e.musteri||"")+' — PDF\'e nelerin gireceğini seç.</div>'
     +'<div data-act="ekstreTkToggle" style="display:flex;align-items:center;gap:12px;padding:13px 14px;background:#202020;border:1px solid #2e2e2e;border-radius:12px;cursor:pointer;margin-top:8px;">'
       +'<div style="position:relative;width:44px;height:25px;border-radius:20px;flex:0 0 auto;background:'+(on?"#2ED573":"#3a3a3a")+';transition:.15s;"><div style="position:absolute;top:3px;left:'+(on?"22px":"3px")+';width:19px;height:19px;border-radius:50%;background:#fff;transition:.15s;"></div></div>'
       +'<div><div style="font-size:13.5px;font-weight:600;color:#fff;">Açık Taksitler / Ödeme Planı\'nı ekle</div><div style="font-size:11.5px;color:var(--muted);margin-top:2px;">'+(on?"Taksit planı PDF\'e eklenecek":"Eklenmeyecek — sadece hesap hareketleri")+'</div></div>'
     +'</div>'
     +'<button class="btnred" data-act="ekstrePdfYap" style="margin-top:16px;">'+ic('doc',16,'#fff')+' PDF oluştur</button></div></div>';
  }
  return '<div class="ovl"><div class="modal" data-stop="1"><div class="mh"><div class="t">Tahsilat Girişi</div><div style="cursor:pointer;" data-act="sheetclose">'+ic('x',20,'#999')+'</div></div>'
   +'<div style="font-size:11.5px;color:var(--muted);margin-bottom:12px;">"Ödemeler" sayfasına işlenir → cari bakiye düşer.</div>'
   +'<label class="lbl">Müşteri</label><input id="t_mus" class="field" value="'+esc(pre.musteri||"")+'" placeholder="Müşteri adı (cariyle aynı)">'
   +'<label class="lbl">Tutar ($)</label><input id="t_tut" class="field" type="number" inputmode="decimal" value="'+(pre.tutar||"")+'" placeholder="0">'
   +'<label class="lbl">Tarih</label><input id="t_tar" class="field" type="date" value="'+today+'">'
   +'<label class="lbl">Yöntem</label><select id="t_yon" class="field"><option>Havale/EFT</option><option>Nakit</option><option>Kredi Kartı</option><option>Çek</option></select>'
   +'<label class="lbl">Açıklama (isteğe bağlı)</label><input id="t_ack" class="field" placeholder="not">'
   +'<button class="btnred" data-act="tahsilatKaydet" '+(S.busy?'disabled':'')+'>'+ic('check',16,'#fff')+' Tahsilatı Kaydet</button></div></div>';
}

document.addEventListener("click",async e=>{
  const tabEl=e.target.closest("[data-tab]"); if(tabEl){ S.tab=tabEl.getAttribute("data-tab"); S.ekstre=null; S.q=""; S.sheet=null; S.sheetData=null; render(); return; }
  const el=e.target.closest("[data-act]"); if(!el) return;
  const a=el.getAttribute("data-act");
  if(a==="login"){login();return;}
  if(a==="logout"){logout();return;}
  if(a==="reload"){reload();return;}
  if(a==="ekstre"){const m=el.getAttribute("data-musteri");S.ekstre={musteri:m,ekstre:[],ozet:{},_loading:true};render();const r=await api("musteri360",{musteri:m});if(r&&r.ok)S.ekstre=r;render();return;}
  if(a==="ekstreBack"){S.ekstre=null;render();return;}
  if(a==="odemeOnay"){act("odemeOnay",{row:el.getAttribute("data-row"),durum:el.getAttribute("data-durum")},"Güncellendi");return;}
  if(a==="istMasrafOnay"){act("istMasrafOnay",{row:el.getAttribute("data-row"),durum:el.getAttribute("data-durum")},"Güncellendi");return;}
  if(a==="istTahsilatOnay"){act("istTahsilatOnay",{row:el.getAttribute("data-row"),durum:el.getAttribute("data-durum")},"Güncellendi");return;}
  if(a==="servisDurum"){act("servisDurum",{row:el.getAttribute("data-row"),durum:el.getAttribute("data-durum")},"Güncellendi");return;}
  if(a==="teklifYanitAc"){const i=+el.getAttribute("data-i");const t=((S.data||{}).teklifler||[])[i]||{};S.sheet="teklifYanit";S.sheetData={row:t._row,musteri:t.musteri,urun:t.urun,adet:t.adet,aciklama:t.aciklama,yanit:t.yanit};render();return;}
  if(a==="teklifYanitKaydet"){const txt=$("ty_txt").value.trim();if(!txt){toast("Yanıt yazın");return;}const row=el.getAttribute("data-row");S.sheet=null;S.sheetData=null;act("teklifYanitla",{row:row,yanit:txt},"Teklif yanıtlandı");return;}
  if(a==="sifreYanitAc"){const i=+el.getAttribute("data-i");const t=((S.data||{}).sifreler||[])[i]||{};S.sheet="sifreYanit";S.sheetData={row:t._row,musteri:t.musteri,makine:t.makine,sifre:t.sifre};render();return;}
  if(a==="sifreKaydet"){const txt=$("sf_txt").value.trim();if(!txt){toast("Şifre yazın");return;}const row=el.getAttribute("data-row");S.sheet=null;S.sheetData=null;act("sifreYanitla",{row:row,sifre:txt,durum:"Verildi"},"Şifre gönderildi");return;}
  if(a==="sifreReddet"){const row=el.getAttribute("data-row");S.sheet=null;S.sheetData=null;act("sifreYanitla",{row:row,durum:"Reddedildi"},"Reddedildi");return;}
  if(a==="siparisEkleAc"){S.sheet="siparisEkle";S.sheetData={};render();return;}
  if(a==="siparisKaydet"){const data={musteri:$("sp_mus").value,makine:$("sp_mak").value,adet:$("sp_adet").value,not:$("sp_not").value};if(!data.musteri||!data.makine){toast("Müşteri ve makine gerekli");return;}S.sheet=null;S.sheetData=null;act("siparisEkle",{data:data},"Sipariş eklendi");return;}
  if(a==="musteriAc"){const k=el.getAttribute("data-k"),s=el.getAttribute("data-s");if(!k||!s){toast("Bu müşterinin portal girişi tanımlı değil");return;}const url=(S.data&&S.data.portalUrl||"https://ersamachine.github.io/portal/")+"#k="+encodeURIComponent(k)+"&s="+encodeURIComponent(s);window.open(url,"_blank");return;}
  if(a==="mailAc"){const m=el.getAttribute("data-musteri");let em="";const ex=S.ekstre||{};if(ex.musteri===m)em=ex.email||"";S.sheet="mail";S.sheetData={musteri:m,email:em};render();return;}
  if(a==="mailGonderEt"){const m=el.getAttribute("data-musteri");const konu=$("ml_konu").value.trim();const msg=$("ml_msg").value.trim();if(!msg){toast("Mesaj yazın");return;}S.sheet=null;S.sheetData=null;act("mailGonder",{data:{musteri:m,konu:konu,mesaj:msg}},"Mail gönderildi");return;}
  if(a==="takipAc"){const m=el.getAttribute("data-musteri");S.sheet="takip";S.sheetData={musteri:m};render();return;}
  if(a==="takipKaydet"){const m=el.getAttribute("data-musteri");const durum=$("tk_durum").value;const soz=$("tk_soz").value;const not=$("tk_not").value.trim();S.sheet=null;S.sheetData=null;act("takipEkle",{data:{musteri:m,durum:durum,sozTarihi:soz,not:not}},"Takip kaydedildi");return;}
  if(a==="bildirimAc"){S.sheet="bildirim";render();return;}
  if(a==="bildirimGit"){const t=el.getAttribute("data-tab");S.sheet=null;S.tab=t;S.ekstre=null;render();return;}
  if(a==="spToggle"){const m=el.getAttribute("data-mus");S.spOpen=S.spOpen||{};S.spOpen[m]=!S.spOpen[m];render();return;}
  if(a==="tahsilat"){S.sheet="tahsilat";S.sheetData={};render();return;}
  if(a==="tahsilatPre"){S.sheet="tahsilat";S.sheetData={musteri:el.getAttribute("data-musteri"),tutar:el.getAttribute("data-tutar")};render();return;}
  if(a==="gecikenEkleAc"){S.sheet="gecikenEkle";S.sheetData={};render();return;}
  if(a==="gecikenKaydet"){const m=$("gc_mus").value;if(!m){toast("Müşteri seç");return;}const not=$("gc_not")?$("gc_not").value:"";S.sheet=null;S.sheetData=null;act("gecikenEkle",{data:{musteri:m,not:not}},"Geciken müşteri eklendi ✓");return;}
  if(a==="ekstrePdfAc"){ if(!S.ekstre||!S.ekstre.musteri){toast("Önce müşteriyi açın");return;} if(S.ekstreTk===undefined)S.ekstreTk=true; S.sheet="ekstrePdf"; render(); return; }
  if(a==="ekstreTkToggle"){ S.ekstreTk=(S.ekstreTk===false); render(); return; }
  if(a==="ekstrePdfYap"){ const tk=S.ekstreTk!==false; S.sheet=null; render(); printEkstre(tk); return; }
  if(a==="gecikenKaldir"){act("gecikenKaldir",{row:el.getAttribute("data-row")},"Kaldırıldı");return;}
  if(a==="sheetclose"){S.sheet=null;S.sheetData=null;render();return;}
  if(a==="tahsilatKaydet"){const data={musteri:$("t_mus").value,tutar:$("t_tut").value,tarih:$("t_tar").value,yontem:$("t_yon").value,aciklama:$("t_ack").value};if(!data.musteri||!(parseFloat(data.tutar)>0)){toast("Müşteri ve tutar gerekli");return;}S.sheet=null;S.sheetData=null;act("tahsilatGir",{data:data},"Tahsilat kaydedildi");return;}
});
document.addEventListener("change",e=>{
  const ms=e.target.closest('#ml_sab'); if(ms){ const t=EMAIL_SABLON[+ms.value]||{}; const k=$("ml_konu"),m=$("ml_msg"); if(k&&!k.value.trim())k.value=t.konu||""; if(k&&t.konu)k.value=t.konu; if(m)m.value=t.mesaj||""; return; }
  const gc=e.target.closest('#gc_mus'); if(gc){ const o=gc.options[gc.selectedIndex]; const bak=o?o.getAttribute('data-bak'):''; const bx=$("gc_bal"),bv=$("gc_balv"); if(bx&&bv){ if(bak&&+bak>0){bv.textContent=money(+bak);bx.style.display="block";}else{bx.style.display="none";} } return; }
  const sel=e.target.closest('select[data-act="cekDurum"]'); if(sel){ act("cekDurum",{row:sel.getAttribute("data-row"),durum:sel.value},"Çek durumu güncellendi"); return; }
  const sp=e.target.closest('select[data-act="siparisDurum"]'); if(sp){ act("siparisDurum",{row:sp.getAttribute("data-row"),durum:sp.value},"Sipariş durumu güncellendi"); }
});
document.addEventListener("input",e=>{
  const sp=e.target.closest('[data-spsearch]'); if(sp){ S.spq=sp.value; const v=document.querySelector(".view"); if(v){ v.innerHTML=siparisView(); const inp=v.querySelector('[data-spsearch]'); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);} } return; }
  const s=e.target.closest('[data-search]'); if(s){ S.q=s.value; const box=document.querySelector(".view .box"); if(box){ /* hafif yeniden çiz */ } S.ekstre=null; const v=document.querySelector(".view"); if(v){ v.innerHTML='<input class="search" placeholder="Müşteri ara…" value="'+esc(S.q)+'" data-search="1">'+musterilerListOnly(); const inp=v.querySelector('[data-search]'); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);} } }
});
function musterilerListOnly(){const d=S.data||{},q=(S.q||"").toLocaleLowerCase("tr");const list=(d.musteriler||[]).filter(m=>!q||m.musteri.toLocaleLowerCase("tr").indexOf(q)>=0);const rows=list.map(m=>'<div class="row" data-act="ekstre" data-musteri="'+esc(m.musteri)+'" style="cursor:pointer;"><div class="grow"><div style="font-weight:700;" class="nowrap">'+esc(m.musteri)+'</div><div style="font-size:11px;color:var(--muted);">'+esc(m.sorumlu||"")+'</div></div><div style="text-align:right;"><div class="mono" style="font-weight:800;color:'+(m.bakiye>0?"#FF6B5E":"#2ED573")+';">'+money(m.bakiye)+'</div><div style="font-size:10px;color:var(--muted);">bakiye</div></div>'+ic('cl',16,'#666')+'</div>').join('')||'<div class="empty">Müşteri bulunamadı.</div>';return '<div class="box" style="margin-top:12px;">'+rows+'</div>';}

(function init(){
  const k=(()=>{try{return localStorage.getItem("pp_kod")}catch(e){return null}})();
  const s=(()=>{try{return localStorage.getItem("pp_sifre")}catch(e){return null}})();
  if(k&&s){ S.kod=k;S.sifre=s;S.authed=true;S.loading=true;render(); api("data").then(res=>{ S.loading=false; if(res&&res.ok){S.data=res;render();} else {S.authed=false;S.err=(res&&res.error)||"";renderLogin();} }).catch(()=>{ S.loading=false;S.authed=false;renderLogin(); }); }
  else renderLogin();
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
})();
</script></body></html>
