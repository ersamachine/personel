<!DOCTYPE html><html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f8f7fa"><title>ERSA Yönetici Paneli</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F7FA;--card:#FFFFFF;--card2:#F8F7FA;--red:#981224;--red-soft:rgba(152,18,36,.12);--gold:#FF9F43;--green:#28C76F;--blue:#3B82F6;--purple:#7367F0;--muted:#6E6B7B;--line:#EBE9F1;--ink:#5D596C;--head:#5E5873;--shadow:0 4px 24px 0 rgba(34,41,47,.08);--shadow-sm:0 2px 8px rgba(34,41,47,.06);}
[data-theme="dark"]{--bg:#25293C;--card:#2F3349;--card2:#363B54;--red:#C0233C;--red-soft:rgba(192,35,60,.2);--gold:#FF9F43;--green:#28C76F;--blue:#5A9CFF;--purple:#9B8DFF;--muted:#8A91B4;--line:#3B4253;--ink:#B6BAD0;--head:#D6D9EC;--shadow:0 4px 24px 0 rgba(0,0,0,.35);--shadow-sm:0 2px 8px rgba(0,0,0,.3);}
body,.side,.topbar,.box,.kpi,.row,.modal,.field,.search,.sel,.iconbtn,.cell,.ni,.tsearch,.fx{transition:background .25s,color .2s,border-color .2s;}
.grp{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1.4px;padding:13px 11px 5px;text-transform:uppercase;opacity:.7;}
.ki{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tsearch{flex:1;max-width:340px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:13px;}
.tsearch:focus-within{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.tsearch input{border:none;background:none;outline:none;color:var(--ink);font-size:13px;flex:1;min-width:0;}
.fx{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;color:var(--head);white-space:nowrap;}
.tools{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.grid2{display:grid;grid-template-columns:1fr 1.3fr;gap:18px;align-items:start;}
.oz2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cald{font-size:9.5px;font-weight:800;color:var(--muted);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.5px;}
.cell{min-height:62px;border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-size:12px;color:var(--ink);position:relative;background:var(--card);}
.cell.mut{opacity:.35;}.cell.today{border-color:var(--red);background:var(--red-soft);font-weight:800;}
.cdue{position:absolute;bottom:5px;left:6px;right:6px;font-size:8.5px;font-weight:800;border-radius:5px;padding:2px 4px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lgd{display:flex;flex-direction:column;gap:9px;flex:1;}.lgd .li{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink);}.lgd .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.lpath{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 1.3s cubic-bezier(.2,.8,.2,1) forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.view{animation:vap .35s cubic-bezier(.2,.8,.2,1);}
@keyframes vap{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
.barG{height:0;transition:height .9s cubic-bezier(.2,.8,.2,1);}
@media(max-width:900px){.grid2,.oz2{grid-template-columns:1fr;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;}
body{background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
i.ic svg{display:block;}
.shell{display:flex;min-height:100vh;}
.side{width:260px;background:var(--card);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;box-shadow:0 0 15px rgba(34,41,47,.05);}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.brand .lg{width:34px;height:34px;border-radius:8px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 3px 8px rgba(152,18,36,.35);}
.brand .nm{font-weight:800;font-size:13px;color:var(--head);}.brand .sb{font-size:9px;color:var(--muted);letter-spacing:1px;}
.nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:8px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;transition:.15s;}
.ni:hover{background:var(--bg);color:var(--head);}
.ni.on{background:linear-gradient(118deg,#981224,rgba(152,18,36,.75));color:#fff;box-shadow:0 2px 6px 0 rgba(152,18,36,.4);}
.ni.on:hover{color:#fff;}
.ni .bd{margin-left:auto;font-size:10px;font-weight:800;border-radius:10px;padding:1px 7px;}
.who{border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--head);}
.av{width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;background:rgba(248,247,250,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:15px 24px;display:flex;align-items:center;justify-content:space-between;z-index:5;}
.topbar .h{font-size:19px;font-weight:800;color:var(--head);}.topbar .s{font-size:12px;color:var(--muted);margin-top:2px;}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
.iconbtn:hover{background:var(--bg);box-shadow:var(--shadow-sm);}
.view{padding:22px 24px 90px;max-width:1140px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:15px 16px;box-shadow:var(--shadow);transition:.18s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(34,41,47,.12);}
.kpi.alert{border-color:#f5c2c7;background:#fdf3f4;}
.kpi .t{font-size:10px;color:var(--muted);letter-spacing:.4px;display:flex;align-items:center;gap:6px;text-transform:uppercase;font-weight:700;}
.kpi .v{font-size:21px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:var(--head);}.kpi .x{font-size:10px;color:var(--muted);margin-top:3px;}
.sec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;margin:24px 0 10px;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.box{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
.row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink);}.row:last-child{border-bottom:none;}
.row:hover{background:var(--bg);}
.row.hd{background:var(--card2);font-size:10px;color:var(--muted);letter-spacing:.5px;font-weight:700;padding:10px 16px;text-transform:uppercase;}
.row.hd:hover{background:var(--card2);}
.grow{flex:1;min-width:0;}.nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mono{font-variant-numeric:tabular-nums;}
.btn{border:none;border-radius:6px;padding:7px 12px;font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s;}
.b-on{background:rgba(40,199,111,.14);color:#28C76F;}.b-on:hover{background:#28C76F;color:#fff;}
.b-no{background:rgba(234,84,85,.14);color:#EA5455;}.b-no:hover{background:#EA5455;color:#fff;}
.b-w{background:rgba(59,130,246,.14);color:#3B82F6;}.b-w:hover{background:#3B82F6;color:#fff;}
.pill{font-size:9.5px;font-weight:800;border-radius:20px;padding:3px 9px;white-space:nowrap;}
.p-o{background:rgba(255,159,67,.16);color:#E07B00;}.p-r{background:rgba(234,84,85,.16);color:#EA5455;}.p-b{background:rgba(59,130,246,.16);color:#3B82F6;}.p-g{background:rgba(40,199,111,.16);color:#1A9E55;}.p-m{background:rgba(115,103,240,.16);color:#7367F0;}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px;}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 14px;color:var(--ink);font-size:14px;outline:none;transition:.15s;}
.search:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.sel{background:var(--card);border:1px solid var(--line);border-radius:6px;color:var(--ink);font-size:12px;padding:6px 8px;outline:none;}
.bottomnav{display:none;}
/* login */
.login{max-width:400px;margin:48px auto;padding:36px 30px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);}
.login .lg{width:54px;height:54px;border-radius:14px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;margin:0 auto 16px;box-shadow:0 4px 12px rgba(152,18,36,.35);}
.loginlogo{display:block;width:220px;max-width:76%;height:auto;margin:4px auto 18px;}
.lt{text-align:center;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:24px;}
.lbl{display:block;font-size:11px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
.field{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:var(--ink);font-size:15px;outline:none;transition:.15s;}
.field:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:14px;margin-top:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(152,18,36,.3);transition:.15s;}
.btnred:hover{box-shadow:0 6px 18px rgba(152,18,36,.45);}.btnred:disabled{opacity:.6;cursor:default;box-shadow:none;}
.rememberbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:14px;}
.lerr{color:#EA5455;font-size:12.5px;text-align:center;margin-top:12px;min-height:16px;}
/* overlay form */
.ovl{position:fixed;inset:0;background:rgba(34,41,47,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:22px 20px 28px;box-shadow:0 -8px 40px rgba(34,41,47,.2);}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}.mh .t{font-size:16px;font-weight:800;color:var(--head);}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#5E5873;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:80;box-shadow:0 8px 24px rgba(34,41,47,.3);}
@media(min-width:760px){ .modal{border-radius:16px;align-self:center;} .ovl{align-items:center;} }
@media(max-width:859px){
  .side{display:none;} .bottomnav{display:flex;} .content{padding-bottom:0;}
  .tsearch,.fx{display:none;}
  .view{padding:16px 14px 86px;} .topbar{padding:14px 16px;}
  .kpis{grid-template-columns:1fr 1fr;}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--card);border-top:1px solid var(--line);justify-content:flex-start;align-items:center;padding-bottom:6px;z-index:20;overflow-x:auto;box-shadow:0 -2px 12px rgba(34,41,47,.08);}
  .bottomnav::-webkit-scrollbar{display:none;}
  .bn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-weight:600;cursor:pointer;flex:0 0 auto;min-width:64px;padding:0 4px;}.bn.on{color:var(--red);}
  .row{flex-wrap:wrap;}
}

function toast(m){const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function initials(s){s=String(s||"").trim();if(!s)return"P";const p=s.split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();}

async function api(action,extra){
  const body=Object.assign({kod:S.kod,sifre:S.sifre,action:action},extra||{});
  const r=await fetch(window.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return await r.json();
}
async function login(){
  const k=$("lkod").value.trim(), s=$("lsifre").value.trim();
  if(!k||!s){S.err="Kod ve şifre girin.";render();return;}
  S.kod=k;S.sifre=s;S.busy=true;S.err="";renderLogin();
  try{ const res=await api("data"); if(res&&res.ok){ S.authed=true;S.data=res;S.busy=false; if($("lrem")&&$("lrem").checked){try{localStorage.setItem("pp_kod",k);localStorage.setItem("pp_sifre",s);}catch(e){}} render(); }
    else { S.busy=false;S.err=(res&&res.error)||"Giriş başarısız.";renderLogin(); } }
  catch(e){ S.busy=false;S.err="Bağlantı hatası.";renderLogin(); }
}
async function reload(){ S.loading=true;render(); try{const res=await api("data"); if(res&&res.ok)S.data=res;}catch(e){} S.loading=false;render(); }
async function act(action,extra,okMsg){ if(S.busy)return; S.busy=true; try{ const res=await api(action,extra); if(res&&res.ok){ if(okMsg)toast(okMsg); const r=await api("data"); if(r&&r.ok)S.data=r; } else toast((res&&res.error)||"İşlem başarısız"); }catch(e){ toast("Bağlantı hatası"); } S.busy=false; render(); }
function logout(){ try{localStorage.removeItem("pp_kod");localStorage.removeItem("pp_sifre");}catch(e){} S.authed=false;S.data=null;S.kod="";S.sifre="";render(); }

function renderLogin(){
  const k=(()=>{try{return localStorage.getItem("pp_kod")||""}catch(e){return""}})();
  const s=(()=>{try{return localStorage.getItem("pp_sifre")||""}catch(e){return""}})();
  $("root").innerHTML='<div class="login"><img class="loginlogo" src="'+LOGO_B64+'" alt="ERSA MACHINERY"><div class="lt">YÖNETİCİ PANELİ</div>'
   +'<label class="lbl">Personel Kodu</label><input id="lkod" class="field" type="text" value="'+esc(k)+'" placeholder="Size verilen kod" autocapitalize="characters">'
   +'<label class="lbl">Şifre</label><input id="lsifre" class="field" type="password" value="'+esc(s)+'" placeholder="••••••••">'
   +'<label class="rememberbox"><input id="lrem" type="checkbox" checked> Beni hatırla</label>'
   +'<button class="btnred" data-act="login" '+(S.busy?'disabled':'')+'>'+(S.busy?'Giriş yapılıyor…':(ic('check',16,'#fff')+' Giriş Yap'))+'</button>'
   +'<div class="lerr">'+esc(S.err||"")+'</div></div>';
  const sp=$("lsifre"); if(sp) sp.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
}

function kpi(t,v,x,i,c,al){return '<div class="kpi'+(al?' alert':'')+'"><div class="t">'+ic(i,12,c)+' '+t+'</div><div class="v" style="color:'+c+';">'+v+'</div>'+(x?'<div class="x">'+x+'</div>':'')+'</div>';}

  if(S.ekstre) return ekstreView();

    case "ozet": return ozetView();
    case "trend": return trendView();
    case "takip": return takipView();
    case "risk": return riskView();
    case "plan": return planView();
    case "musteriler": return musterilerView();
    case "odeme": return odemeView();

function agingBars(a){
  const items=[["Gecikmiş",a.gecikmis||0,"#981224"],["0-30 gün",a.d30||0,"#E07B00"],["31-60 gün",a.d60||0,"#3B82F6"],["61-90 gün",a.d90||0,"#28C76F"],["90+ gün",a.ileri||0,"#7367F0"]];
  const max=Math.max(1,...items.map(i=>i[1]));
  const W=640,H=250,padB=48,padT=30,padL=12,padR=12; const bw=(W-padL-padR)/items.length;
  let g="";
  // yatay kılavuz çizgileri
  for(let k=1;k<=3;k++){ const y=padT+(H-padT-padB)*(k/3); g+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" style="stroke:var(--line)"/>'; }
  items.forEach((it,i)=>{ const h=(it[1]/max)*(H-padT-padB); const x=padL+i*bw+bw*0.2; const w=bw*0.6; const y=H-padB-h;
    g+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+Math.max(h,3)+'" rx="7" fill="'+it[2]+'"/>';
    g+='<text x="'+(x+w/2)+'" y="'+(y-8)+'" text-anchor="middle" style="fill:var(--head)" font-size="12.5" font-weight="800">'+money(it[1])+'</text>';
    g+='<text x="'+(x+w/2)+'" y="'+(H-padB+19)+'" text-anchor="middle" style="fill:var(--muted)" font-size="11.5">'+it[0]+'</text>';
  });
  g+='<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" style="stroke:var(--line)" stroke-width="1.5"/>';
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;">'+g+'</svg>';
}

document.addEventListener("click",async e=>{
  const tabEl=e.target.closest("[data-tab]"); if(tabEl){ S.tab=tabEl.getAttribute("data-tab"); S.ekstre=null; S.q=""; S.sheet=null; S.sheetData=null; render(); return; }
  const el=e.target.closest("[data-act]"); if(!el) return;
  const a=el.getAttribute("data-act");
  if(a==="login"){login();return;}
  if(a==="logout"){logout();return;}
  if(a==="reload"){reload();return;}
  if(a==="ekstre"){const m=el.getAttribute("data-musteri");S.ekstre={musteri:m,ekstre:[],ozet:{},_loading:true};render();const r=await api("musteri360",{musteri:m});if(r&&r.ok)S.ekstre=r;render();return;}

function musterilerListOnly(){const d=S.data||{},q=(S.q||"").toLocaleLowerCase("tr");const list=(d.musteriler||[]).filter(m=>!q||m.musteri.toLocaleLowerCase("tr").indexOf(q)>=0);const rows=list.map(m=>'<div class="row" data-act="ekstre" data-musteri="'+esc(m.musteri)+'" style="cursor:pointer;"><div class="grow"><div style="font-weight:700;" class="nowrap">'+esc(m.musteri)+'</div><div style="font-size:11px;color:var(--muted);">'+esc(m.sorumlu||"")+'</div></div><div style="text-align:right;"><div class="mono" style="font-weight:800;color:'+(m.bakiye>0?"#EA5455":"#28C76F")+';">'+money(m.bakiye)+'</div><div style="font-size:10px;color:var(--muted);">bakiye</div></div>'+ic('cl',16,'#666')+'</div>').join('')||'<div class="empty">Müşteri bulunamadı.</div>';return '<div class="box" style="margin-top:12px;">'+rows+'</div>';}

function pdate(s){if(!s)return null;s=String(s).trim();let m;if(m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/)){let y=+m[3];if(y<100)y+=2000;return new Date(y,+m[2]-1,+m[1]);}if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))return new Date(+m[1],+m[2]-1,+m[3]);const d=new Date(s);return isNaN(d.getTime())?null:d;}
function daysOpen(s){const d=pdate(s);if(!d)return null;return Math.floor((Date.now()-d.getTime())/86400000);}
function canSee(id){const g=(S.data&&S.data.gizliTablar)||[];return g.indexOf(id)<0;}
function tabMeta(id){return TABS.find(t=>t[0]===id);}
function buildNav(){return NAVGROUPS.map(g=>{const items=g[1].filter(id=>tabMeta(id)&&canSee(id));if(!items.length)return"";return '<div class="grp">'+g[0]+'</div>'+items.map(id=>{const t=tabMeta(id);const on=S.tab===id;const b=badgeOf(id);return '<div class="ni'+(on?' on':'')+'" data-tab="'+id+'">'+ic(t[2],17)+' <span>'+t[1]+'</span>'+(b?'<span class="bd" style="background:'+b[1]+';color:'+b[2]+';">'+b[0]+'</span>':'')+'</div>';}).join('');}).join('');}
function applyTheme(){try{S.theme=localStorage.getItem("pp_theme")||"light";}catch(e){S.theme="light";}document.documentElement.setAttribute("data-theme",S.theme);const mt=document.querySelector('meta[name=theme-color]');if(mt)mt.setAttribute("content",S.theme==="dark"?"#25293C":"#f8f7fa");}
function toggleTheme(){S.theme=(S.theme==="dark")?"light":"dark";try{localStorage.setItem("pp_theme",S.theme);}catch(e){}applyTheme();render();}
function fetchFX(){var setFx=function(v){if(!(v>0))return false;S.fx=Number(v).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2});var el=document.getElementById("fxval");if(el)el.textContent=S.fx+" ₺";return true;};fetch("https://open.er-api.com/v6/latest/USD").then(function(r){return r.json();}).then(function(j){if(!setFx(j&&j.rates&&j.rates.TRY))throw 0;}).catch(function(){fetch("https://api.frankfurter.app/latest?from=USD&to=TRY").then(function(r){return r.json();}).then(function(j){setFx(j&&j.rates&&j.rates.TRY);}).catch(function(){});});}

function sortMus(list){const s=S.musSort||"bakiyeDesc";const a=list.slice();if(s==="bakiyeAsc")a.sort((x,y)=>(x.bakiye||0)-(y.bakiye||0));else if(s==="ad")a.sort((x,y)=>String(x.musteri).localeCompare(String(y.musteri),"tr"));else if(s==="riskDesc")a.sort((x,y)=>((x.karne?x.karne.puan:9999)-(y.karne?y.karne.puan:9999)));else a.sort((x,y)=>(y.bakiye||0)-(x.bakiye||0));return a;}
function musTools(){const opts=[["bakiyeDesc","Bakiye ↓"],["bakiyeAsc","Bakiye ↑"],["ad","İsim A-Z"],["riskDesc","Risk ↓"]];const sv=S.musSort||"bakiyeDesc";return '<div class="tools"><input class="search" style="flex:1;min-width:200px;" placeholder="Müşteri ara…" value="'+esc(S.q||"")+'" data-search="1"><select class="sel" data-act="musSort">'+opts.map(o=>'<option value="'+o[0]+'"'+(o[0]===sv?' selected':'')+'>'+o[1]+'</option>').join('')+'</select><button class="btn b-w" style="padding:9px 13px;" data-act="csvMus">'+ic('dl',15)+' CSV indir</button></div>';}
function csvMus(){const d=S.data||{};const rows=[["Musteri","Sorumlu","Bakiye","RiskPuani","RiskKategori"]];(d.musteriler||[]).forEach(m=>rows.push([m.musteri,m.sorumlu||"",Math.round(m.bakiye||0),(m.karne?m.karne.puan:""),(m.karne?m.karne.kategori:"")]));const csv="﻿"+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(";")).join("\r\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="ersa-musteriler.csv";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},1000);toast("CSV indirildi ✓");}
function lineChartSVG(data,prev,lbl){const w=560,h=200,pl=46,pb=26,pt=12,pr=12;const all=data.concat(prev||[]);const max=Math.max.apply(null,all)*1.12||1;const min=0;const sx=i=>pl+i*((w-pl-pr)/Math.max(1,data.length-1));const sy=v=>pt+(h-pt-pb)*(1-(v-min)/(max-min));let g="";for(let k=0;k<=3;k++){const y=pt+(h-pt-pb)*(k/3);g+='<line x1="'+pl+'" y1="'+y+'" x2="'+(w-pr)+'" y2="'+y+'" style="stroke:var(--line)" stroke-width="1"/>';g+='<text x="'+(pl-7)+'" y="'+(y+3)+'" text-anchor="end" font-size="9.5" style="fill:var(--muted)">'+kshort(max-(max-min)*(k/3))+'</text>';}const pth=p=>p.map((v,i)=>(i?'L':'M')+sx(i)+' '+sy(v)).join(' ');const area='M'+sx(0)+' '+sy(data[0])+data.slice(1).map((v,i)=>'L'+sx(i+1)+' '+sy(v)).join('')+'L'+sx(data.length-1)+' '+(h-pb)+'L'+pl+' '+(h-pb)+'Z';const dots=data.map((v,i)=>'<circle cx="'+sx(i)+'" cy="'+sy(v)+'" r="3.2" style="fill:var(--red);stroke:var(--card)" stroke-width="2"/>').join('');const xl=(lbl||[]).map((l,i)=>'<text x="'+sx(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9.5" style="fill:var(--muted)">'+l+'</text>').join('');return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;">'+g+'<path d="'+area+'" style="fill:var(--red-soft)"/>'+(prev&&prev.length?'<path d="'+pth(prev)+'" fill="none" style="stroke:var(--muted)" stroke-width="2" stroke-dasharray="4 4" opacity=".5"/>':'')+'<path class="lpath" d="'+pth(data)+'" fill="none" style="stroke:var(--red)" stroke-width="2.6"/>'+dots+xl+'</svg>';}
function donutSVG(segs,centerTop,centerBot){const r=58,c=2*Math.PI*r;let off=0,arcs='<circle r="'+r+'" cx="90" cy="90" fill="none" style="stroke:var(--line)" stroke-width="20"/>';segs.forEach(s=>{const len=c*s[1]/100;arcs+='<circle r="'+r+'" cx="90" cy="90" fill="none" stroke="'+s[2]+'" stroke-width="20" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 90 90)"/>';off+=len;});const lg=segs.map(s=>'<div class="li"><span class="sw" style="background:'+s[2]+'"></span>'+s[0]+'<b style="margin-left:auto;color:var(--head);">'+s[3]+'</b></div>').join('');return '<div style="display:flex;align-items:center;gap:20px;padding:18px;flex-wrap:wrap;"><svg width="170" height="170" viewBox="0 0 180 180">'+arcs+'<text x="90" y="84" text-anchor="middle" font-size="12" style="fill:var(--muted)">'+centerTop+'</text><text x="90" y="106" text-anchor="middle" font-size="18" font-weight="800" style="fill:var(--head)">'+centerBot+'</text></svg><div class="lgd">'+lg+'</div></div>';}
function barsHTML(data,max,col){return '<div style="display:flex;align-items:flex-end;gap:14px;height:190px;padding:10px 6px 6px;">'+data.map(x=>{const h=Math.max(2,Math.round(x[1]/(max||1)*100));return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;"><div style="font-size:11px;font-weight:800;color:var(--head);">'+kshort(x[1])+'</div><div class="barG" style="width:100%;border-radius:7px 7px 0 0;background:'+col+';height:'+h+'%;"></div><div style="font-size:10.5px;color:var(--muted);font-weight:600;">'+x[0]+'</div></div>';}).join('')+'</div>';}
function takipView(){const d=S.data||{};const list=(d.gecikenler||[]).slice().sort((a,b)=>(b.gun||0)-(a.gun||0));const rows=list.map(g=>{const tel=g.tel||"";const gun=g.gun;const acc=(gun>30?'#EA5455':gun>7?'#FF9F43':'#3B82F6');return '<div class="row"><div style="width:5px;height:34px;border-radius:6px;background:'+acc+';flex-shrink:0;"></div><div class="grow"><div style="font-weight:700;color:var(--head);" class="nowrap">'+esc(g.musteri)+'</div><div style="font-size:11px;color:var(--muted);" class="nowrap">'+(g.kaynak==="Bakiye"?'Bakiye alacağı'+(g.not?' · '+esc(g.not):''):esc(g.taksit||"")+' · vade '+esc(g.vade||""))+'</div></div><div style="text-align:right;width:108px;flex-shrink:0;"><div class="mono" style="font-weight:800;color:#EA5455;">'+money(g.tutar)+'</div>'+(gun!=null?'<span class="pill p-r">'+gun+'g geç</span>':'')+'</div>'+(tel?'<a class="btn b-w" href="tel:'+esc(String(tel).replace(/\s/g,""))+'" style="text-decoration:none;flex:0 0 auto;">'+ic('phone',12,'#3B82F6')+'Ara</a><a class="btn b-w" href="https://wa.me/'+esc(waNum(tel))+'" target="_blank" style="text-decoration:none;flex:0 0 auto;">'+ic('phone',12,'#28C76F')+'WA</a>':'')+'<button class="btn b-on" data-act="tahsilatPre" data-musteri="'+esc(g.musteri)+'" data-tutar="'+(g.tutar||0)+'">'+ic('cash',12,'#28C76F')+'Tahsilat</button></div>';}).join('')||'<div class="empty">Aranacak müşteri yok 👍</div>';return '<div class="tools"><div style="font-size:12.5px;color:var(--muted);font-weight:600;">'+list.length+' müşteri aranmayı bekliyor · gecikmeye göre sıralı</div><div style="flex:1;"></div><button class="btn b-on" style="padding:9px 14px;" data-act="topluHatirlatAc">'+ic('send',14,'#28C76F')+' Toplu Hatırlatma</button></div><div class="box">'+rows+'</div>';}
function trendView(){const t=(S.data||{}).trend;const demo=!t;const haft=(t&&t.tahsilat)||[210000,185000,240000,198000,265000,232000,288000,310000];const onc=(t&&t.oncekiDonem)||[180000,170000,205000,190000,220000,210000,235000,250000];const lbl=(t&&t.haftalar)||["Hf1","Hf2","Hf3","Hf4","Hf5","Hf6","Hf7","Hf8"];const aylik=(t&&t.aylik)||[["Şub",680000],["Mar",740000],["Nis",820000],["May",922000],["Haz",1088000]];const buAy=(t&&t.buAy)||1088000,gecen=(t&&t.gecenAy)||922000;const fark=gecen?Math.round((buAy-gecen)/gecen*100):0;const ort=Math.round(haft.reduce((a,b)=>a+b,0)/haft.length);const k='<div class="kpis" style="grid-template-columns:repeat(3,1fr);">'+kpic("Bu Ay Tahsilat",money(buAy),(fark>=0?'▲ %'+fark:'▼ %'+Math.abs(fark))+' geçen aya',fark>=0?'#1A9E55':'#EA5455','trend','#28C76F','rgba(40,199,111,.14)')+kpic("Haftalık Ortalama",money(ort),"son "+haft.length+" hafta","var(--muted)","chart","#981224","var(--red-soft)")+kpic("En İyi Hafta",money(Math.max.apply(null,haft)),"zirve","var(--muted)","cash","#7367F0","rgba(115,103,240,.14)")+'</div>';const note=demo?'<span class="pill p-o" style="margin-left:auto;letter-spacing:0;text-transform:none;">örnek veri — backend bağlanınca canlı</span>':'<span class="pill p-g" style="margin-left:auto;letter-spacing:0;text-transform:none;">▲ canlı</span>';return k+'<div class="sec">'+ic('trend',13)+'HAFTALIK TAHSİLAT · kesikli: geçen dönem '+note+'</div><div class="box"><div style="padding:16px 16px 4px;">'+lineChartSVG(haft,onc,lbl)+'</div></div>'+'<div class="sec">AYLIK KARŞILAŞTIRMA</div><div class="box"><div style="padding:8px 12px;">'+barsHTML(aylik,Math.max.apply(null,aylik.map(a=>a[1]))*1.12,'linear-gradient(180deg,var(--red),rgba(152,18,36,.65))')+'</div></div>';}
function riskView(){const d=S.data||{};const ms=(d.musteriler||[]).filter(m=>(m.bakiye||0)>0);const top=ms.slice().sort((a,b)=>(b.bakiye||0)-(a.bakiye||0)).slice(0,8);let lo=0,mi=0,hi=0;ms.forEach(m=>{if(m.karne){if(m.karne.seviye==="dusuk")lo++;else if(m.karne.seviye==="orta")mi++;else hi++;}});const tot=lo+mi+hi||1;const dseg=[["Düşük risk",Math.round(lo/tot*100),"#28C76F",lo+" müş."],["Orta risk",Math.round(mi/tot*100),"#FF9F43",mi+" müş."],["Yüksek risk",Math.round(hi/tot*100),"#EA5455",hi+" müş."]];const rows=top.map((m,i)=>'<div class="row"><div style="width:26px;height:26px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--muted);flex-shrink:0;">'+(i+1)+'</div><div class="grow" data-act="ekstre" data-musteri="'+esc(m.musteri)+'" style="cursor:pointer;min-width:0;"><div style="font-weight:700;color:var(--head);" class="nowrap">'+esc(m.musteri)+'</div><div style="font-size:11px;color:var(--muted);">'+esc(m.sorumlu||"")+'</div></div>'+riskBadge(m.karne)+'<div class="mono" style="width:108px;text-align:right;font-weight:800;color:#EA5455;flex-shrink:0;">'+money(m.bakiye)+'</div></div>').join('')||'<div class="empty">Veri yok.</div>';return '<div class="grid2"><div class="box"><div style="padding:15px 18px;border-bottom:1px solid var(--line);font-weight:800;color:var(--head);font-size:14px;">Risk Segmentasyonu</div>'+donutSVG(dseg,"Karneli",(lo+mi+hi)+" müş.")+((lo+mi+hi)===0?'<div style="padding:0 18px 16px;font-size:11.5px;color:var(--muted);line-height:1.5;">Henüz tahsilat karnesi yok. Ödenmiş taksitler (vade ↔ ödeme tarihi) geldikçe müşteriler otomatik risk segmentine girer.</div>':'')+'</div><div class="box"><div style="padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;font-weight:800;color:var(--head);font-size:14px;">En Yüksek Bakiye<span class="pill p-r" style="margin-left:auto;">Top 8</span></div>'+rows+'</div></div>'+'<div class="sec">'+ic('chart',13)+'TAHSİLAT KARNESİ · ortalama gecikme</div><div class="kpis" style="grid-template-columns:repeat(3,1fr);">'+kpic("Düşük Riskli",lo,"≤2 gün gecikme","#1A9E55","check","#28C76F","rgba(40,199,111,.14)")+kpic("Orta Riskli",mi,"3–12 gün","#E07B00","clock","#FF9F43","rgba(255,159,67,.14)")+kpic("Yüksek Riskli",hi,"12+ gün — yakın takip","#EA5455","alert","#EA5455","rgba(234,84,85,.14)")+'</div>';}
function cekCalendar(){const d=S.data||{};const cek=(d.cekler||[]).filter(c=>c.vade);const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();const first=new Date(yr,mo,1);const start=(first.getDay()+6)%7;const dim=new Date(yr,mo+1,0).getDate();const byDay={};cek.forEach(c=>{const dt=pdate(c.vade);if(dt&&dt.getFullYear()===yr&&dt.getMonth()===mo){(byDay[dt.getDate()]=byDay[dt.getDate()]||[]).push(c);}});const days=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];let cells=days.map(x=>'<div class="cald">'+x+'</div>').join('');for(let i=0;i<start;i++)cells+='<div class="cell mut"></div>';for(let day=1;day<=dim;day++){const list=byDay[day]||[];const today=(day===now.getDate());const tot=list.reduce((a,c)=>a+(c.usd||0),0);cells+='<div class="cell'+(today?' today':'')+'">'+day+(list.length?'<div class="cdue '+(today?'p-r':'p-b')+'" title="'+esc(list.map(c=>c.musteri).join(", "))+'">'+(list.length>1?list.length+' çek':kshort(tot))+'</div>':'')+'</div>';}const mon=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][mo];const cnt=cek.filter(c=>{const dt=pdate(c.vade);return dt&&dt.getFullYear()===yr&&dt.getMonth()===mo;}).length;return '<div class="sec">'+ic('cal',13)+mon+' '+yr+' · '+cnt+' çek vadesi</div><div class="box" style="padding:16px;"><div class="cal">'+cells+'</div></div>';}

(function init(){
  applyTheme();
  document.addEventListener("keydown",function(e){var t=e.target;if(t&&t.getAttribute&&t.getAttribute("data-globalsearch")&&e.key==="Enter"){S.q=t.value;S.tab="musteriler";S.ekstre=null;S.sheet=null;render();}});
  setTimeout(fetchFX,300);
  const k=(()=>{try{return localStorage.getItem("pp_kod")}catch(e){return null}})();
  const s=(()=>{try{return localStorage.getItem("pp_sifre")}catch(e){return null}})();
  if(k&&s){ S.kod=k;S.sifre=s;S.authed=true;S.loading=true;render(); api("data").then(res=>{ S.loading=false; if(res&&res.ok){S.data=res;render();} else {S.authed=false;S.err=(res&&res.error)||"";renderLogin();} }).catch(()=>{ S.loading=false;S.authed=false;renderLogin(); }); }
  else renderLogin();
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
})();
</script></body></html>
